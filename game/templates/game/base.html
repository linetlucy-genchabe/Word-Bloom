{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}WordBloom{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}"/>
  <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
  <link rel="icon" type="image/png" href="{% static 'favicon.png' %}">
  {% block head %}{% endblock %}
  <style>
    html, body { height: 100%; }
    .page-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .page-wrap > *:not(nav):not(footer) { flex: 1; }
    footer {
      text-align: center;
      padding: 0.75rem 1rem;
      font-size: 0.78rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      flex-shrink: 0;
    }
    footer span { color: var(--plum); font-weight: 500; }
  </style>
</head>
<body>
  <div class="page-wrap">
    <nav class="nav">
      <a href="{% url 'index' %}" class="nav-logo">Word<span>Bloom</span></a>
      <div style="display:flex;gap:10px">
        {% block nav_extra %}{% endblock %}
      </div>
    </nav>
    {% block content %}{% endblock %}
    <footer>
      © {% now "Y" %} <span>LinetLucy Genchabe</span> · All rights reserved
    </footer>
  </div>

  <script src="{% static 'js/utils.js' %}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
